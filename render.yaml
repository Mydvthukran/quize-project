services:
  - type: web
    name: learnloop-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEYS
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_ORIGIN
        value: https://learnloop-frontend-oabw.onrender.com

  - type: web
    name: learnloop-frontend
    rootDir: frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://learnloop-backend-6v64.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://learnloop-backend-6v64.onrender.com
